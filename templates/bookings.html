<!DOCTYPE html>
<html>
<head>
    <title>Bookings</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
        }
        h1 {
            margin-top: 30px;
        }
        .topbar {
            margin-top: 20px;
        }
        .topbar a {
            margin: 5px;
            padding: 8px 12px;
            background-color: #333;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .card {
            background: white;
            margin: 15px auto;
            padding: 20px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }
        a.button {
            display: inline-block;
            margin: 5px;
            padding: 8px 12px;
            text-decoration: none;
            color: white;
            border-radius: 5px;
        }
        .complete {
            background-color: blue;
        }
        .delete {
            background-color: red;
        }
    </style>
</head>
<body>

    <div class="topbar">
        <a href="/services">Back to Services</a>
        <a href="/logout">Logout</a>
    </div>

    <h1>Your Bookings</h1>

    {% for b in bookings %}
        <div class="card">
            <p><strong>Booking ID:</strong> {{ b[0] }}</p>
            <p><strong>Service ID:</strong> {{ b[2] }}</p>
            <p><strong>Status:</strong> {{ b[3] }}</p>

            <a class="button complete" href="/update/{{ b[0] }}">Mark Completed</a>
            <a class="button delete" href="/delete/{{ b[0] }}">Delete</a>
        </div>
    {% endfor %}

</body>
</html>
