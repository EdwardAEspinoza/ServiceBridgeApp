<!DOCTYPE html>
<html>
<head>
    <title>Login | ServiceBridge</title>
    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:linear-gradient(135deg,#0d6efd,#5aa9ff);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            background:white;
            width:360px;
            padding:35px;
            border-radius:16px;
            box-shadow:0 12px 30px rgba(0,0,0,.18);
            text-align:center;
        }

        h1{
            color:#0d6efd;
            margin-bottom:8px;
        }

        p{
            color:#666;
            margin-bottom:20px;
        }

        input{
            width:92%;
            padding:12px;
            margin:8px 0;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#0d6efd;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0b5ed7;
        }

        .flash{
            padding:10px;
            margin-bottom:12px;
            border-radius:8px;
            font-size:14px;
        }

        .success{
            background:#d1e7dd;
            color:#0f5132;
        }

        .error{
            background:#f8d7da;
            color:#842029;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>ServiceBridge</h1>
    <p>Login to continue</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
